<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevos jugadores · C.D. Bustarviejo</title>

<link rel="stylesheet" href="https://www.cdbustarviejo.com/css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:'Montserrat',sans-serif;
background-image:url("https://www.cdbustarviejo.com/img/fondo.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
margin:0;
}

.contenedor{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:120px 20px 60px 20px;
}

</style>

</head>

<body>

<header class="header">
<div class="header-contenido">

<div class="logo">
<img src="https://www.cdbustarviejo.com/img/escudo.png">
<span>C.D. Bustarviejo</span>
</div>

<button class="menu-toggle">☰</button>

<nav class="menu">

<a href="https://www.cdbustarviejo.com">Inicio</a>
<a href="https://www.cdbustarviejo.com/el-club.html">El Club</a>
<a href="https://www.cdbustarviejo.com/equipos.html">Equipos</a>
<a href="https://www.cdbustarviejo.com/patrocinadores.html">Patrocinadores</a>
<a href="https://www.cdbustarviejo.com/tienda.html">Tienda</a>
<a href="https://www.cdbustarviejo.com/comunicados.html">Comunicados</a>

<a class="btn-menu" target="_blank"
href="https://base44.app/api/apps/6992c6be619d2da592897991/functions/publicData">
Competición
</a>

<a href="https://www.cdbustarviejo.com/area-interna.html">Área interna</a>

</nav>

</div>
</header>

<div class="contenedor">

<div class="w-full max-w-md rounded-3xl shadow-2xl backdrop-blur-sm bg-white/70 overflow-hidden">

<div class="text-center p-6">

<img src="https://www.cdbustarviejo.com/img/escudo.png" class="w-24 mx-auto mb-3">

<h1 class="text-2xl font-extrabold text-gray-900">
¿Quieres jugar con nosotros?
</h1>

<p class="text-gray-700 text-sm mt-1">
Forma parte del Club Deportivo Bustarviejo
</p>

</div>

<div class="px-6 pb-6">

<form action="https://formspree.io/f/xlgbagbn" method="POST" class="space-y-4">

<input type="text" name="nombre" required placeholder="Nombre"
class="w-full bg-white rounded-xl p-3 border border-gray-300">

<input type="number" name="edad" required placeholder="Edad"
class="w-full bg-white rounded-xl p-3 border border-gray-300">

<input type="tel" name="telefono" required placeholder="Teléfono"
class="w-full bg-white rounded-xl p-3 border border-gray-300">

<input type="email" name="email" required placeholder="Email"
class="w-full bg-white rounded-xl p-3 border border-gray-300">

<select name="deporte" required
class="w-full bg-white rounded-xl p-3 border border-gray-300">

<option value="">Deporte</option>
<option>Fútbol</option>
<option>Fútbol femenino</option>
<option>Baloncesto</option>
<option>Pádel</option>

</select>

<textarea name="mensaje" rows="3"
placeholder="Cuéntanos algo más"
class="w-full bg-white rounded-xl p-3 border border-gray-300"></textarea>

<button
type="submit"
class="w-full bg-black text-white py-4 rounded-xl font-bold">

Enviar

</button>

</form>

</div>

</div>

</div>

<footer class="footer">

<div class="footer-contenido">

<div class="footer-col">
<img src="https://www.cdbustarviejo.com/img/escudo.png" class="footer-logo">
<p class="footer-titulo">C.D. Bustarviejo</p>
<p class="footer-texto">Deporte y valores desde 1989</p>
</div>

</div>

<div class="footer-copy">
© 1989–2026 · C.D. Bustarviejo
</div>

</footer>

<script>

document.addEventListener('DOMContentLoaded',function(){

const toggle=document.querySelector('.menu-toggle');
const menu=document.querySelector('.menu');

toggle.addEventListener('click',function(){
menu.classList.toggle('activo');
});

});

</script>

</body>
</html>
